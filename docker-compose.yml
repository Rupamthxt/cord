version: '3.8'

services:
  # PostgreSQL Graph Database Service
  postgres:
    image: postgres:15-alpine
    container_name: cord-postgres
    restart: always
    environment:
      POSTGRES_USER: cord
      POSTGRES_PASSWORD: cord
      POSTGRES_DB: cord_graph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cord -d cord_graph"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cord-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  qdrant_storage:
    driver: local
